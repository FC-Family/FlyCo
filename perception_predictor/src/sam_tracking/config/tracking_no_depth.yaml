camera_param: "$(find sam_tracking)/config/camera.json"
camera_info_topic: "/airsim_node/drone_1/front_center/Scene/camera_info"
min_height: 0.1
cluster_resolution: 300
odom_topic: "/tracking/input/odometry"
pc_topic: "/tracking/input/pointcloud"
img_topic: "/tracking/input/image"
gimbal_topic: "/gimbal_pose"
gimbal_max_stamp_delta: 0.12
cluster_depth_mask_max_stamp_delta: 1.5
airsim_camera_pose_enabled: true
tf_static_topic: "/tf_static"
airsim_odom_frame: "drone_1/odom_local_enu"
airsim_camera_body_frame: "front_center_body/static"
airsim_camera_optical_frame: "front_center_optical/static"
depth_mask_topic: ""
depth_guidance_enabled: false
depth_guidance_consistency_threshold: 0.2
depth_guidance_empty_mask_streak: 3
depth_guidance_reinit_cooldown_frames: 8
depth_guidance_min_mask_area: 400
depth_guidance_bbox_padding: 12
depth_guidance_max_reinit_bbox_area_ratio: 1.0
depth_guidance_max_reinit_bbox_width_ratio: 1.0
depth_guidance_max_reinit_bbox_height_ratio: 1.0
depth_guidance_reinit_on_inconsistency: true
depth_guidance_reinit_on_empty_streak: true
sam2_samurai_mode: true
sam2_depth_score_weight: 0.0
sam2_kf_score_weight: 0.15
sam2_memory_bank_geo_score_threshold: 0.0
evf_text_init_enabled: false
evf_root: "$(env HOME)/workspace/EVF-SAM"
evf_model_version: "YxZhang/evf-sam2"
evf_model_type: "sam2"
evf_precision: "fp16"
evf_device: "cuda"
evf_image_size: 224
evf_semantic_level: false
evf_min_mask_area: 256
evf_max_init_points: 8

query_points_topic: "/tracking/prompt/points"
query_text_topic: "/tracking/prompt/text"

mask_pointcloud_topic: "/tracking/target_pointcloud"
cluster_pointcloud_topic: "/tracking/guider_pc"
filtered_pointcloud_topic: "/tracking/env_pc"
cluster_target_pc_topic: "/tracking/target_pc"
pose_topic: "/tracking/pose"
mask_image_topic: "/tracking/mask/image"
mask_with_pose_topic: "/tracking/mask/with_pose"
compressed_mask_topic: "/sam_tracking/compress_mask_and_transform"
cluster_projection_topic: "/tracking/cluster/projection_image"
cluster_mask_topic: "/tracking/cluster/mask_image"
cluster_projection_use_accumulated: true
cluster_projection_use_hpr: true
cluster_incremental_mode: true
cluster_input_max_points: 4096
cluster_voxel_size: 0.2
